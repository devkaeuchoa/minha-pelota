name: minha-pelota

# ── Deploy rápido ─────────────────────────────────────────────────────────────
# APP_IMAGE=ghcr.io/your-org/minha-pelota APP_VERSION=v1.2.0
# docker compose pull
# docker compose down && docker compose up -d
# docker compose exec app php artisan migrate --force
#
# O volume `storage` persiste uploads entre deploys.
# O volume `assets` é recriado pelo serviço init a cada `docker compose up`.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Init: copia assets compilados para o volume compartilhado ───────────────
  # Roda uma vez por `docker compose up`, garantindo que Nginx veja sempre os
  # assets da imagem atual — sem precisar recriar o volume manualmente.
  init:
    image: ${APP_IMAGE:-minha-pelota}:${APP_VERSION:-latest}
    user: root
    command: >
      sh -c "rm -rf /assets/.[!.]* /assets/* 2>/dev/null;
             cp -r /app/public/. /assets/;
             chown -R 101:101 /assets"
    volumes:
      - assets:/assets
    restart: "no"
    network_mode: none

  # ── App: Laravel PHP-FPM ────────────────────────────────────────────────────
  app:
    image: ${APP_IMAGE:-minha-pelota}:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - storage:/app/storage/app/public
    networks: [app_net]
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Web: Nginx — serve estáticos e faz proxy FastCGI para app:9000 ──────────
  # TLS: configure um reverse proxy na VPS (Nginx no host ou Caddy) apontando
  # para esta porta. Não exponha a porta 80 diretamente em produção sem TLS.
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - assets:/app/public:ro
    networks: [app_net]
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  app_net:

volumes:
  assets:    # Assets compilados pelo Vite — recriado a cada deploy pelo init
  storage:   # Uploads de usuários — preservado entre deploys
