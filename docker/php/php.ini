; ── OPcache ──────────────────────────────────────────────────────────────────
; Disabled timestamp validation for performance in immutable container images.
; Rebuild the image whenever PHP source changes — do not rely on revalidation.
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=4000
opcache.revalidate_freq=0
opcache.validate_timestamps=0
opcache.fast_shutdown=1

; ── Security ──────────────────────────────────────────────────────────────────
expose_php=Off

; ── Resource limits ───────────────────────────────────────────────────────────
memory_limit=256M
max_execution_time=60
upload_max_filesize=10M
post_max_size=12M

; ── Error handling ────────────────────────────────────────────────────────────
; Log to stderr so Docker captures errors via `docker logs` / log aggregator.
; Never display errors to the browser in production.
log_errors=On
error_log=/dev/stderr
display_errors=Off
display_startup_errors=Off
