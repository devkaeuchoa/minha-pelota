server {
    listen 80;
    server_name _;
    root /app/public;
    index index.php;

    charset utf-8;
    server_tokens off;
    client_max_body_size 12M;

    # Assets com hash no nome (Vite) — cache imutável de 1 ano
    location ~* ^/build/.+ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Todos os outros requests: tenta arquivo estático, cai no Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Endpoint nativo do Laravel — usado pelo Docker healthcheck e runbook
    location = /up {
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # PHP via FastCGI para o container app
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    # Nega acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
}
